<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html,
body {
  margin: 0;
  min-height: 100%;
  background-image: url("leather-background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

    body {
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .about-section {
      width: 100%;
      padding: 40px 24px;
      box-sizing: border-box;
    }

    .about-text-image {
  display: block;
  width: min(100%, 900px);
  height: auto;
  margin: 0 auto;
}

@media (max-width: 700px) {
  .about-text-image {
    transform: scale(1.1);
    transform-origin: center center;
  }
}
   .pixelart-dj-scream-link {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 20;
  display: block;
  cursor: pointer;
  text-decoration: none;
}

.pixelart-dj-scream {
  display: block;
  width: 253px; /* 15% bigger than 220px */
  height: auto;
  transition: transform 0.2s ease;
  transform-origin: center center;
}

.pixelart-dj-scream-link:hover .pixelart-dj-scream,
.pixelart-dj-scream-link:focus-visible .pixelart-dj-scream {
  transform: scale(1.03);
}

@media (max-width: 700px) {
  .pixelart-dj-scream-link {
    position: fixed;
    right: 14px;
    bottom: 14px;
    z-index: 20;
    display: block;
    cursor: pointer;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .pixelart-dj-scream {
    width: 138px; /* 15% bigger than 120px */
    height: auto;
    display: block;
    transition: transform 0.2s ease;
    transform-origin: center center;
  }

  .pixelart-dj-scream-link:active .pixelart-dj-scream,
  .pixelart-dj-scream-link:focus-visible .pixelart-dj-scream {
    transform: scale(1.03);
  }
}
  </style>
</head>

<body>
  <section class="about-section">
    <img src="about-text.png" alt="About text" class="about-text-image">
  </section>
  <a 
  href="index.html"
  class="pixelart-dj-scream-link"
  aria-label="Back to main page"
>
  <img 
    class="pixelart-dj-scream" 
    src="pixelart-dj-scream.png" 
    alt="Back to main page"
  >
</a>
>
</body>
</html>
