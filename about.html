<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html,
body {
  margin: 0;
  min-height: 100%;
  background-image: url("leather-background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

    body {
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .about-section {
      width: 100%;
      padding: 40px 24px;
      box-sizing: border-box;
    }

    .about-text-image {
  display: block;
  width: min(100%, 900px);
  height: auto;
  margin: 0 auto;
}

@media (max-width: 700px) {
  .about-text-image {
    transform: scale(1.1);
    transform-origin: center center;
  }
}
  </style>
</head>

<body>
  <section class="about-section">
    <img src="about-text.png" alt="About text" class="about-text-image">
  </section>
</body>
</html>
