<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f7f3ea;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .about-section {
      width: 100%;
      padding: 40px 24px;
      box-sizing: border-box;
    }

    .about-text-image {
      display: block;
      width: min(100%, 900px);
      height: auto;
      margin: 0 auto;
    }
  </style>
</head>

<body>
  <section class="about-section">
    <img src="about-text.png" alt="About text" class="about-text-image">
  </section>
</body>
</html>
