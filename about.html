<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant — About</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: url("leather-background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 18px 18px 140px 18px;
    }

    .about-text-image {
      display: block;
      width: min(100%, 1100px);
      height: auto;
      margin: 0 auto;
    }

    .pixelart-dj-scream-link {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 20;
      display: block;
      cursor: pointer;
      text-decoration: none;
    }

    .pixelart-dj-scream {
      display: block;
      width: 253px;
      height: auto;
      transition: transform 0.2s ease;
      transform-origin: center center;
    }

    .pixelart-dj-scream-link:hover .pixelart-dj-scream,
    .pixelart-dj-scream-link:focus-visible .pixelart-dj-scream {
      transform: scale(1.03);
    }

    @media (max-width: 700px) {
      .page {
        padding: 14px 12px 120px 12px;
      }

      .about-text-image {
        width: 100%;
        max-width: none;
        height: auto;
        margin: 0 auto;
      }

      .pixelart-dj-scream-link {
        right: 14px;
        bottom: 14px;
        -webkit-tap-highlight-color: transparent;
      }

      .pixelart-dj-scream {
        width: 138px;
      }

      .pixelart-dj-scream-link:active .pixelart-dj-scream,
      .pixelart-dj-scream-link:focus-visible .pixelart-dj-scream {
        transform: scale(1.03);
      }
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <main class="page">
    <img 
      src="about-text.png" 
      alt="About Lubrikant" 
      class="about-text-image"
    >
  </main>

  <a 
    href="index.html"
    class="pixelart-dj-scream-link"
    aria-label="Back to main page"
  >
    <img 
      class="pixelart-dj-scream" 
      src="pixelart-dj-scream.png" 
      alt="Back to main page"
    >
  </a>
</body>
</html>
