<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant — DJ / Events CV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: url("leather-background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 18px 18px 140px 18px;
    }

    a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 42px;
      transform: rotate(-5deg);
      font-size: 16px;
      line-height: 1.25;
    }

    .dj-cv-image {
      display: block;
      width: min(100%, 1100px);
      height: auto;
      margin: 0 auto;
    }

    @media (max-width: 700px) {
      .page {
        padding: 14px 12px 120px 12px;
      }

      .back-link {
        margin-bottom: 34px;
        font-size: 15px;
      }

      .dj-cv-image {
        width: 100%;
        max-width: none;
        height: auto;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <main class="page">
    <a class="back-link" href="index.html">← BACK</a>

    <img 
      src="dj-cv.png" 
      alt="Selected DJ CV and selected events CV" 
      class="dj-cv-image"
    >
  </main>
</body>
</html>
