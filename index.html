<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f7f3ea;
    }

    body {
      min-height: 100vh;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      line-height: 1.2;
      position: relative;
      overflow: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: url("lubrikant-holding.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .nav-scatter {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .nav-scatter a {
      position: absolute;
      pointer-events: auto;
      white-space: nowrap;
      font-size: 16px;
    }

    .about {
      top: 18px;
      left: 18px;
      transform: rotate(-8deg);
    }

    .cv {
      top: 44px;
      left: 128px;
      transform: rotate(5deg);
    }

    .soundcloud {
      top: 20px;
      left: 360px;
      transform: rotate(-3deg);
    }

    .mix-series {
      top: 66px;
      left: 540px;
      transform: rotate(7deg);
    }

    .blog {
      top: 30px;
      left: 735px;
      transform: rotate(-10deg);
    }

    .curved-text {
      position: fixed;
      top: 82px;
      left: 28px;
      width: 760px;
      height: 180px;
      z-index: 2;
      pointer-events: none;
    }

    .curved-text text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 24px;
      fill: #111;
      letter-spacing: 0.5px;
    }

    .pixel-art {
      position: fixed;
      right: 28px;
      bottom: 28px;
      z-index: 2;
      width: clamp(120px, 18vw, 260px);
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .signup {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 3;
      max-width: 420px;
      font-size: 15px;
    }

    .signup p {
      margin: 0 0 6px 0;
    }

    .signup form {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .signup input {
      width: 240px;
      box-sizing: border-box;
      font: inherit;
      padding: 5px 7px;
      border: 1px solid #111;
      background: rgba(247, 243, 234, 0.75);
      color: #111;
    }

    .signup button {
      font: inherit;
      padding: 5px 8px;
      border: 1px solid #111;
      background: rgba(247, 243, 234, 0.75);
      color: #111;
      cursor: pointer;
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
      }

      .background {
        background-size: cover;
        background-position: center;
      }

      .nav-scatter {
        position: relative;
        inset: auto;
        padding: 14px 12px 0 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
      }

      .nav-scatter a {
        position: static;
        font-size: 15px;
      }

      .about {
        transform: rotate(-5deg);
      }

      .cv {
        transform: rotate(3deg);
      }

      .soundcloud {
        transform: rotate(-2deg);
      }

      .mix-series {
        transform: rotate(4deg);
      }

      .blog {
        transform: rotate(-6deg);
      }

      .curved-text {
        position: relative;
        top: auto;
        left: auto;
        width: 100%;
        height: 150px;
        margin-top: 16px;
      }

      .curved-text text {
        font-size: 20px;
      }

      .page {
        min-height: 100vh;
        padding-bottom: 260px;
      }

      .pixel-art {
        right: 12px;
        bottom: 150px;
        width: clamp(110px, 34vw, 180px);
      }

      .signup {
        left: 12px;
        right: 12px;
        bottom: 12px;
        max-width: none;
      }

      .signup form {
        display: block;
      }

      .signup input,
      .signup button {
        width: 100%;
        margin-bottom: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <main class="page">

    <nav class="nav-scatter">
      <a class="about" href="about.html" target="_blank" rel="noopener noreferrer">ABOUT</a>
      <a class="cv" href="dj-events-cv.html" target="_blank" rel="noopener noreferrer">DJ / EVENTS CV</a>
      <a class="soundcloud" href="https://soundcloud.com/volte_face_bleed" target="_blank" rel="noopener noreferrer">SOUNDCLOUD</a>
       <a class="soundcloud" href="https://soundcloud.com/volte_face_bleed/sets/lubrikate-your-living-room" target="_blank" rel="noopener noreferrer">LUBRIKATE YOUR LIVING ROOM</a>
      <a class="blog" href="blog.html" target="_blank" rel="noopener noreferrer">BLOG</a>
    </nav>

    <svg class="curved-text" viewBox="0 0 760 180" aria-label=Everything for Somebody>
      <path id="lubrikant-curve" d="M 20 120 C 160 35, 410 20, 735 105" fill="none"></path>
      <text>
        <textPath href="#lubrikant-curve" startOffset="0%">
          LUBRIKANT ‘EVERYTHING FOR SOMEBODY’
        </textPath>
      </text>
    </svg>

    <img class="pixel-art" src="pixelart.png" alt="Lubrikant pixel art">

  </main>

  <section class="signup">
    <p>💦Occasional Lubrications💦</p>

    <form>
      <input type="email" placeholder="Email address">
      <button type="submit">Subscribe</button>
    </form>
  </section>
</body>
</html>
