<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f7f3ea;
    }

    body {
      min-height: 100vh;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      line-height: 1.25;
      position: relative;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: url("lubrikant-holding.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 14px 18px 110px 18px;
    }

    .top-line {
      max-width: 1100px;
    }

    nav {
      display: inline;
    }

    nav a,
    .main-text a,
    .signup a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    nav a {
      margin-right: 10px;
      white-space: nowrap;
    }

    .main-text {
      display: inline;
    }

    .signup {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 2;
      max-width: 420px;
      font-size: 15px;
    }

    .signup p {
      margin: 0 0 6px 0;
    }

    .signup form {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .signup input {
      width: 240px;
      box-sizing: border-box;
      font: inherit;
      padding: 5px 7px;
      border: 1px solid #111;
      background: rgba(247, 243, 234, 0.75);
      color: #111;
    }

    .signup button {
      font: inherit;
      padding: 5px 8px;
      border: 1px solid #111;
      background: rgba(247, 243, 234, 0.75);
      color: #111;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      body {
        font-size: 15px;
      }

      .page {
        padding: 12px 12px 150px 12px;
      }

      nav a {
        margin-right: 7px;
      }

      .signup {
        left: 12px;
        right: 12px;
        bottom: 12px;
        max-width: none;
      }

      .signup form {
        display: block;
      }

      .signup input,
      .signup button {
        width: 100%;
        margin-bottom: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <main class="page">
    <div class="top-line">
      <nav>
        <a href="about.html">ABOUT</a>
        <a href="dj-events-cv.html">DJ / EVENTS CV</a>
        <a href="https://soundcloud.com/volte_face_bleed">SOUNDCLOUD</a>
        <a href="https://soundcloud.com/volte_face_bleed/sets/lubrikate-your-living-room-a">MIX SERIES</a>
        <a href="blog.html">BLOG</a>
      </nav>

      <span class="main-text">
        LUBRIKANT ‘EVERYTHING FOR SOMEBODY’
      </span>
    </div>
  </main>

  <section class="signup">
    <p>Subscribe for occasional updates.</p>

    <form>
      <input type="email" placeholder="Email address">
      <button type="submit">Subscribe</button>
    </form>
  </section>
</body>
</html>
