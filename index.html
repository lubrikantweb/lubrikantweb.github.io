<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
  .pixel-art {
  transition: transform 0.2s ease;
  transform-origin: center;
  cursor: pointer;
}

a:hover .pixel-art,
a:focus-visible .pixel-art {
  transform: scale(1.03);
}
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f7f3ea;
    }
.pixel-art {
  transition: transform 0.2s ease;
}

.pixel-art-link:hover .pixel-art {
  transform: scale(1.03);
}
    body {
      min-height: 100vh;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      line-height: 1.2;
      position: relative;
      overflow: hidden;
    }

    .background {
      position: fixed;
      inset: 0;
      background-image: url("lubrikant-holding.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    a {
      color: #111;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .slogan {
      position: fixed;
      top: 16px;
      left: 18px;
      z-index: 2;
      width: 620px;
      height: 90px;
      pointer-events: none;
    }

    .slogan text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 24px;
      fill: #111;
      letter-spacing: 0.5px;
    }

    .nav-scatter {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .nav-scatter a {
      position: absolute;
      pointer-events: auto;
      white-space: nowrap;
      font-size: 16px;
      transition:
        top 1.35s cubic-bezier(.2, .9, .25, 1.15),
        left 1.35s cubic-bezier(.2, .9, .25, 1.15),
        right 1.35s cubic-bezier(.2, .9, .25, 1.15),
        transform 1.35s cubic-bezier(.2, .9, .25, 1.15);
    }

    .about {
      top: 92px;
      left: 18px;
      transform: rotate(-8deg);
      transition-delay: 0s;
    }

    .cv {
      top: 120px;
      left: 20%;
      transform: rotate(5deg);
      transition-delay: .08s;
    }

    .soundcloud {
      top: 94px;
      left: 40%;
      transform: rotate(-3deg);
      transition-delay: .16s;
    }

    .living-room {
      top: 132px;
      left: 58%;
      transform: rotate(7deg);
      transition-delay: .24s;
    }

    .blog {
      top: 98px;
      left: calc(100% - 82px);
      transform: rotate(-10deg);
      transition-delay: .32s;
    }

    .nav-scatter.piled .about {
      top: calc(100vh - 72px);
      left: 26%;
      transform: rotate(-17deg);
    }

    .nav-scatter.piled .cv {
      top: calc(100vh - 58px);
      left: 33%;
      transform: rotate(9deg);
    }

    .nav-scatter.piled .soundcloud {
      top: calc(100vh - 86px);
      left: 42%;
      transform: rotate(-8deg);
    }

    .nav-scatter.piled .living-room {
      top: calc(100vh - 64px);
      left: 50%;
      transform: rotate(14deg);
    }

    .nav-scatter.piled .blog {
      top: calc(100vh - 78px);
      left: 68%;
      transform: rotate(-13deg);
    }

    .pixel-art {
      position: fixed;
      right: 28px;
      bottom: 28px;
      z-index: 2;
      width: clamp(120px, 18vw, 260px);
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .signup {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 3;
      max-width: 420px;
      font-size: 15px;
    }

    .signup p {
      margin: 0 0 6px 0;
    }

    .signup form {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .signup input {
      width: 240px;
      box-sizing: border-box;
      font: inherit;
      padding: 5px 7px;
      border: 1px solid #111;
      background: rgba(247, 243, 234, 0.75);
      color: #111;
    }

    .signup button {
      font: inherit;
      padding: 5px 8px;
      border: 1px solid #111;
      background: rgba(247, 243, 234, 0.75);
      color: #111;
      cursor: pointer;
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
        font-size: 15px;
      }

      .background {
        background-size: 88vw auto;
        background-position: center 44%;
        background-repeat: no-repeat;
      }

      .page {
        min-height: 100vh;
        padding: 12px 12px 260px 12px;
        box-sizing: border-box;
      }

      .slogan {
        position: relative;
        top: auto;
        left: auto;
        width: 100%;
        height: 78px;
        margin: 10px 0 4px 0;
      }

      .slogan text {
        font-size: 18px;
      }

      .nav-scatter {
        position: relative;
        inset: auto;
        padding: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 9px 14px;
        max-width: 340px;
      }

      .nav-scatter a {
        position: static;
        font-size: 15px;
        line-height: 1.15;
        white-space: normal;
        transition: none;
      }

      .about {
        transform: rotate(-5deg);
      }

      .cv {
        transform: rotate(3deg);
      }

      .soundcloud {
        transform: rotate(-2deg);
      }

      .living-room {
        transform: rotate(4deg);
        max-width: 210px;
      }

      .blog {
        transform: rotate(-6deg);
      }

      .pixel-art {
        position: fixed;
        right: 10px;
        bottom: 132px;
        width: clamp(95px, 30vw, 145px);
        z-index: 2;
      }

      .signup {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        max-width: none;
        font-size: 14px;
        z-index: 3;
      }

      .signup form {
        display: block;
      }

      .signup input,
      .signup button {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="background"></div>

  <main class="page">

    <svg class="slogan" viewBox="0 0 620 90" aria-label="Everything for Someone">
      <path id="slogan-curve" d="M 10 62 C 130 8, 370 8, 610 58" fill="none"></path>
      <text>
        <textPath href="#slogan-curve" startOffset="0%">
          ‘EVERYTHING FOR SOMEONE’
        </textPath>
      </text>
    </svg>

    <nav class="nav-scatter" id="navScatter">
<a href="about.html">ABOUT</a>
<a href="dj-events-cv.html">DJ / EVENTS CV</a>
      <a class="soundcloud" href="https://soundcloud.com/volte_face_bleed" target="_blank" rel="noopener noreferrer">MY MIXES</a>
      <a class="living-room" href="lylr.html" target="_blank" rel="noopener noreferrer">LUBRIKATE YOUR LIVING ROOM</a>
      <a class="blog" href="https://buttondown.com/Lubrikant/archive/" target="_blank" rel="noopener noreferrer">BLOG</a>
    </nav>

<a 
  href="https://www.instagram.com/volte_face_bleed/" 
  target="_blank" 
  rel="noopener noreferrer"
  aria-label="Visit Volte Face Bleed on Instagram"
>
  <img class="pixel-art" src="pixelart.png" alt="Lubrikant pixel art">
</a>
  </main>

  <section class="signup">
    <p>💦Occasional Lubrications💦</p>

    <form>
      <input type="email" placeholder="Email address">
      <button type="submit">Subscribe</button>
    </form>
  </section>

  <script>
    window.addEventListener("load", function () {
      if (window.matchMedia("(max-width: 800px)").matches) return;

      setTimeout(function () {
        document.getElementById("navScatter").classList.add("piled");
      }, 1800);
    });
  </script>
</body>
</html>
