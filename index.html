<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lubrikant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f7f3ea;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    .main-logo-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .main-logo {
      width: min(100%, 1400px);
      height: auto;
      display: block;
    }

    .mailing-list-box {
      position: fixed;
      left: 50%;
      bottom: 32px;
      transform: translateX(-50%);
      z-index: 10;

      width: min(90vw, 420px);
      padding: 14px 16px;
      box-sizing: border-box;

      background: rgba(247, 243, 234, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.18);
      border-radius: 999px;

      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .mailing-list-box input {
      flex: 1;
      min-width: 0;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: #111;
    }

    .mailing-list-box input::placeholder {
      color: rgba(0, 0, 0, 0.55);
    }

    .mailing-list-box button {
      border: none;
      background: #111;
      color: #f7f3ea;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .mailing-list-box button:hover {
      opacity: 0.85;
    }

    .bottom-right-photo-link {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 20;
      display: block;
      cursor: pointer;
      text-decoration: none;
    }

    .bottom-right-photo {
      display: block;
      width: 160px;
      height: auto;
    }

    .bottom-right-photo-link:hover .bottom-right-photo {
      transform: scale(1.03);
    }

    .bottom-right-photo {
      transition: transform 0.2s ease;
    }

    @media (max-width: 700px) {
      .main-logo-wrap {
        align-items: center;
        padding: 18px;
      }

      .main-logo {
        width: 115vw;
        max-width: none;
      }

      .mailing-list-box {
        bottom: 18px;
        width: calc(100vw - 32px);
        padding: 12px 14px;
      }

      .bottom-right-photo-link {
        right: 14px;
        bottom: 86px;
      }

      .bottom-right-photo {
        width: 90px;
      }
    }
  </style>
</head>

<body>

  <main class="main-logo-wrap">
    <!-- Replace this filename with your main Lubrikant logo/image -->
    <img 
      src="lubrikant-logo.png" 
      alt="Lubrikant" 
      class="main-logo"
    >
  </main>

  <!-- Replace the action URL with your mailing list provider form URL, if using one -->
  <form class="mailing-list-box" action="#" method="post">
    <input 
      type="email" 
      name="email" 
      placeholder="join the mailing list" 
      required
    >
    <button type="submit">submit</button>
  </form>

  <a 
    href="https://www.instagram.com/volte_face_bleed/" 
    target="_blank" 
    rel="noopener noreferrer"
    class="bottom-right-photo-link"
    aria-label="Visit Volte Face Bleed on Instagram"
  >
   
    <img 
      src="pixelart.png" 
      alt="Volte Face Bleed Instagram" 
      class="bottom-right-photo"
    >
  </a>

</body>
</html>
